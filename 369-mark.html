<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edamame — The Mark</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;background:#0b0f0d;color:#ddd8ce}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative}
.page::after{content:'';position:absolute;inset:0;background:radial-gradient(circle 500px at 50% 45%,rgba(74,124,89,.06),transparent)}
.center{position:relative;z-index:1;text-align:center;max-width:800px;width:100%}
.mark-row{display:flex;justify-content:center;gap:clamp(24px,6vw,64px);flex-wrap:wrap;margin-bottom:48px}
.mark-box{border-radius:24px;padding:clamp(32px,5vw,56px) clamp(24px,4vw,48px);min-width:240px;flex:1;max-width:360px;display:flex;align-items:center;justify-content:center}
.mark-box--dark{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04)}
.mark-box--light{background:#FAFAF8;border:1px solid rgba(0,0,0,.06)}
.row2{display:flex;justify-content:center;gap:clamp(16px,4vw,40px);flex-wrap:wrap;margin-bottom:48px}
.mini-box{border-radius:16px;padding:24px;text-align:center;min-width:120px}
.mini-box--dark{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.mini-box--green{background:#4A7C59;border:1px solid rgba(0,0,0,.1)}
.label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:12px}
.label--dark{color:rgba(255,255,255,.5)}
h2{font-family:'DM Serif Display',serif;font-size:clamp(1.3rem,3vw,1.8rem);margin-bottom:8px}
.sub{font-size:13px;color:rgba(255,255,255,.3);max-width:400px;margin:0 auto 40px;line-height:1.6}
.spec{text-align:left;font-size:11px;color:rgba(255,255,255,.3);line-height:2.2;padding:20px 24px;border:1px solid rgba(255,255,255,.04);border-radius:14px;background:rgba(0,0,0,.2);max-width:560px;margin:0 auto;white-space:pre-wrap}
.spec b{color:#C4A35A;font-weight:600}
.h-lockup{margin:32px auto;display:flex;align-items:center;justify-content:center;gap:12px}
.h-lockup span{font-size:clamp(20px,4vw,28px);font-weight:700;letter-spacing:-.3px}
.h-lockup--dark span{color:#ddd8ce}
.divider{width:60px;height:1px;background:rgba(255,255,255,.06);margin:40px auto}
.sizes{display:flex;align-items:flex-end;justify-content:center;gap:clamp(16px,4vw,32px);margin:24px 0 40px}
.sizes>div{text-align:center}
</style>
</head>
<body>
<div class="page">
<div class="center">

<div class="mark-row">
<div class="mark-box mark-box--dark" id="box-dark"></div>
<div class="mark-box mark-box--light" id="box-light"></div>
</div>

<h2>The 369 mark</h2>
<p class="sub">Vesica piscis beans. Golden-ratio center. 3 beans, 6 arcs, 9 construction circles. Pod, stem, and wordmark — hand-crafted.</p>

<div class="divider"></div>

<div class="row2">
<div class="mini-box mini-box--dark" id="icon-sm"></div>
<div class="mini-box mini-box--green" id="icon-green"></div>
</div>

<div class="h-lockup h-lockup--dark" id="h-lock"></div>

<div class="divider"></div>

<div class="sizes" id="sizes"></div>

<div class="divider"></div>

<div class="spec" id="spec"></div>

</div>
</div>

<script>
var PHI=(1+Math.sqrt(5))/2, S3=Math.sqrt(3);

// Hand-tuned proportions
var R=18; // side bean circle radius
var RC=R*PHI; // center bean circle radius  
var GAP=R/6;

function makeBean(bx,by,r){
  // Vesica piscis: two circles radius r, separated by r, horizontally
  // Intersection points at (bx, by +/- r*sqrt(3)/2)
  var halfH=r*S3/2;
  var ty=by-halfH, boty=by+halfH;
  // Two arcs of radius r from top to bottom
  return 'M'+bx.toFixed(2)+' '+ty.toFixed(2)+
    'A'+r.toFixed(2)+' '+r.toFixed(2)+' 0 0 0 '+bx.toFixed(2)+' '+boty.toFixed(2)+
    'A'+r.toFixed(2)+' '+r.toFixed(2)+' 0 0 0 '+bx.toFixed(2)+' '+ty.toFixed(2)+'Z';
}

function makePod(cx,cy,beanW,beanH,padX,padY){
  // Organic pod shape — custom bezier, NOT an ellipse
  // Wider around the center bean, tapered at top and bottom
  var hw=beanW/2+padX; // half-width at widest
  var hh=beanH/2+padY; // half-height
  var top=cy-hh, bot=cy+hh;
  var narrowFactor=0.55; // how narrow the tips are relative to the middle
  
  // Pod path: pointed top, organic sides, pointed bottom
  return 'M'+cx.toFixed(1)+' '+top.toFixed(1)+
    // Right side: top to middle
    ' C'+(cx+hw*narrowFactor).toFixed(1)+' '+(top).toFixed(1)+
    ' '+(cx+hw).toFixed(1)+' '+(cy-hh*0.4).toFixed(1)+
    ' '+(cx+hw).toFixed(1)+' '+cy.toFixed(1)+
    // Right side: middle to bottom
    ' C'+(cx+hw).toFixed(1)+' '+(cy+hh*0.4).toFixed(1)+
    ' '+(cx+hw*narrowFactor).toFixed(1)+' '+(bot).toFixed(1)+
    ' '+cx.toFixed(1)+' '+bot.toFixed(1)+
    // Left side: bottom to middle
    ' C'+(cx-hw*narrowFactor).toFixed(1)+' '+(bot).toFixed(1)+
    ' '+(cx-hw).toFixed(1)+' '+(cy+hh*0.4).toFixed(1)+
    ' '+(cx-hw).toFixed(1)+' '+cy.toFixed(1)+
    // Left side: middle to top
    ' C'+(cx-hw).toFixed(1)+' '+(cy-hh*0.4).toFixed(1)+
    ' '+(cx-hw*narrowFactor).toFixed(1)+' '+(top).toFixed(1)+
    ' '+cx.toFixed(1)+' '+top.toFixed(1)+'Z';
}

function makeStem(cx,podTop,len){
  var cp1x=cx+len*0.2, cp1y=podTop-len*0.45;
  var cp2x=cx+len*0.35, cp2y=podTop-len*0.85;
  var endx=cx+len*0.5, endy=podTop-len;
  return 'M'+cx.toFixed(1)+' '+podTop.toFixed(1)+
    ' C'+cp1x.toFixed(1)+' '+cp1y.toFixed(1)+
    ' '+cp2x.toFixed(1)+' '+cp2y.toFixed(1)+
    ' '+endx.toFixed(1)+' '+endy.toFixed(1);
}

function drawLogo(container,scale,dark,showWord){
  var sc=scale;
  var r=R*sc, rc=RC*sc, gap=GAP*sc;
  var total=r*2+gap+rc*2+gap+r*2;
  // Bean positions relative to center
  var w=total;
  var lx=-w/2+r;
  var rx=w/2-r;
  
  var hc=rc*S3; // center bean half-height... no, full height
  var hs=r*S3;
  
  // Canvas
  var cw=Math.round(w+40*sc);
  var ch=Math.round(hc+60*sc+(showWord?36*sc:0));
  var cx=cw/2, cy=(hc+40*sc)/2;
  
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+cw+' '+ch);
  svg.setAttribute('width',Math.round(cw*1.2));
  svg.setAttribute('height',Math.round(ch*1.2));
  
  var padX=8*sc, padY=6*sc;
  var beanAreaW=total;
  var beanAreaH=hc;
  var stemLen=12*sc;
  
  var podPath=makePod(cx,cy,beanAreaW,beanAreaH,padX,padY);
  var podTop=cy-beanAreaH/2-padY;
  var stemPath=makeStem(cx,podTop,stemLen);
  
  var podStroke=dark?'#4A7C59':'#3A6349';
  var podFill=dark?'rgba(74,124,89,0.05)':'rgba(74,124,89,0.03)';
  var txFill=dark?'#ddd8ce':'#2D2D2A';
  var tagFill=dark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.22)';
  
  var s='';
  // Pod
  s+='<path d="'+podPath+'" fill="'+podFill+'" stroke="'+podStroke+'" stroke-width="'+(1.6*sc)+'" stroke-linejoin="round"/>';
  // Stem
  s+='<path d="'+stemPath+'" stroke="'+podStroke+'" stroke-width="'+(1.3*sc)+'" fill="none" stroke-linecap="round"/>';
  // Beans
  var blx=cx+lx, brx=cx+rx;
  s+='<path d="'+makeBean(blx,cy,r)+'" fill="#4A7C59" stroke="#3A6349" stroke-width="'+(0.4*sc)+'"/>';
  s+='<path d="'+makeBean(cx,cy,rc)+'" fill="#C4A35A" stroke="#b0913a" stroke-width="'+(0.4*sc)+'"/>';
  s+='<path d="'+makeBean(brx,cy,r)+'" fill="#4A7C59" stroke="#3A6349" stroke-width="'+(0.4*sc)+'"/>';
  
  if(showWord){
    var wy=cy+beanAreaH/2+padY+22*sc;
    s+='<text x="'+cx.toFixed(1)+'" y="'+wy.toFixed(1)+'" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="'+(20*sc)+'" font-weight="700" fill="'+txFill+'" letter-spacing="-0.4">edamame</text>';
  }
  
  svg.innerHTML=s;
  container.appendChild(svg);
  return svg;
}

function drawHLockup(container,scale,dark){
  var sc=scale;
  var r=R*sc, rc=RC*sc, gap=GAP*sc;
  var total=r*2+gap+rc*2+gap+r*2;
  var hc=rc*S3;
  var padX=6*sc, padY=5*sc;
  
  var iconW=total+padX*2+10*sc;
  var iconH=hc+padY*2+12*sc;
  var textW=120*sc;
  var fullW=iconW+12*sc+textW;
  var fullH=Math.max(iconH,30*sc);
  
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+fullW.toFixed(0)+' '+fullH.toFixed(0));
  svg.setAttribute('width',Math.round(fullW*1.5));
  svg.setAttribute('height',Math.round(fullH*1.5));
  
  var icx=iconW/2, icy=fullH/2;
  var lx=-total/2+r, rx2=total/2-r;
  
  var podStroke=dark?'#4A7C59':'#3A6349';
  var podFill=dark?'rgba(74,124,89,0.05)':'rgba(74,124,89,0.03)';
  var txFill=dark?'#ddd8ce':'#2D2D2A';
  
  var podPath=makePod(icx,icy,total,hc,padX,padY);
  var podTop=icy-hc/2-padY;
  var stemPath=makeStem(icx,podTop,8*sc);
  
  var s='';
  s+='<path d="'+podPath+'" fill="'+podFill+'" stroke="'+podStroke+'" stroke-width="'+(1.2*sc)+'" stroke-linejoin="round"/>';
  s+='<path d="'+stemPath+'" stroke="'+podStroke+'" stroke-width="'+(1*sc)+'" fill="none" stroke-linecap="round"/>';
  s+='<path d="'+makeBean(icx+lx,icy,r)+'" fill="#4A7C59" stroke="#3A6349" stroke-width="'+(0.3*sc)+'"/>';
  s+='<path d="'+makeBean(icx,icy,rc)+'" fill="#C4A35A" stroke="#b0913a" stroke-width="'+(0.3*sc)+'"/>';
  s+='<path d="'+makeBean(icx+rx2,icy,r)+'" fill="#4A7C59" stroke="#3A6349" stroke-width="'+(0.3*sc)+'"/>';
  s+='<text x="'+(iconW+12*sc).toFixed(1)+'" y="'+(icy+1).toFixed(1)+'" font-family="DM Sans,sans-serif" font-size="'+(18*sc)+'" font-weight="700" fill="'+txFill+'" dominant-baseline="central" letter-spacing="-0.4">edamame</text>';
  
  svg.innerHTML=s;
  container.appendChild(svg);
}

// Render main marks
drawLogo(document.getElementById('box-dark'),2.8,true,true);
drawLogo(document.getElementById('box-light'),2.8,false,true);

// Small icons
drawLogo(document.getElementById('icon-sm'),2.2,true,false);

// Green bg icon
(function(){
  var el=document.getElementById('icon-green');
  var sc=2.2, r=R*sc, rc=RC*sc, gap=GAP*sc;
  var total=r*2+gap+rc*2+gap+r*2;
  var hc=rc*S3;
  var padX=8*sc, padY=6*sc;
  var cw=total+40*sc, ch=hc+40*sc;
  var cx=cw/2, cy=ch/2;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+cw.toFixed(0)+' '+ch.toFixed(0));
  svg.setAttribute('width',Math.round(cw*1.2));svg.setAttribute('height',Math.round(ch*1.2));
  var lx=-total/2+r, rx=total/2-r;
  var podPath=makePod(cx,cy,total,hc,padX,padY);
  var podTop=cy-hc/2-padY;
  var stemPath=makeStem(cx,podTop,12*sc);
  var s='';
  s+='<path d="'+podPath+'" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="'+(1.5*sc)+'" stroke-linejoin="round"/>';
  s+='<path d="'+stemPath+'" stroke="rgba(255,255,255,0.4)" stroke-width="'+(1.2*sc)+'" fill="none" stroke-linecap="round"/>';
  s+='<path d="'+makeBean(cx+lx,cy,r)+'" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.4)" stroke-width="'+(0.3*sc)+'"/>';
  s+='<path d="'+makeBean(cx,cy,rc)+'" fill="#C4A35A" stroke="#b0913a" stroke-width="'+(0.3*sc)+'"/>';
  s+='<path d="'+makeBean(cx+rx,cy,r)+'" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.4)" stroke-width="'+(0.3*sc)+'"/>';
  svg.innerHTML=s;
  el.appendChild(svg);
})();

// Horizontal lockup
drawHLockup(document.getElementById('h-lock'),2.2,true);

// Sizes
var sizesEl=document.getElementById('sizes');
[3.0,1.8,1.0,0.5].forEach(function(sc){
  var div=document.createElement('div');
  drawLogo(div,sc,true,false);
  var lab=document.createElement('div');
  lab.className='label';
  lab.textContent=Math.round(RC*sc*S3*2.5)+'px';
  div.appendChild(lab);
  sizesEl.appendChild(div);
});

// Spec
document.getElementById('spec').innerHTML=
'<b>Geometry</b>\n'+
'  Beans = vesica piscis (circle-arc intersection)\n'+
'  Aspect ratio = sqrt(3) : 1 = 1.732 : 1\n'+
'  Side bean radius R = base unit\n'+
'  Center bean radius = phi x R = 1.618R\n'+
'  Gap = R / 6\n\n'+
'<b>Shape</b>\n'+
'  Pod = hand-tuned cubic bezier (not an ellipse)\n'+
'  Tapered at poles, widest at equator\n'+
'  Stem = organic bezier curve, top-right lean\n\n'+
'<b>369 encoding</b>\n'+
'  <b>3</b> beans | <b>6</b> generating circles | <b>9</b> total\n'+
'  <b>3</b> + <b>6</b> = <b>9</b>\n'+
'  Left = 3 (mi) | Center = 9 (ku) | Right = 6 (ro)\n'+
'  369 = Miroku = Maitreya\n'+
'  Gap = R/<b>6</b> | Stem = H/<b>9</b> | Grid = <b>3</b> x <b>9</b> = 27 -> <b>9</b>\n\n'+
'<b>Colors</b>\n'+
'  Side beans  #4A7C59 (forest green)\n'+
'  Center bean #C4A35A (warm gold)\n'+
'  Pod stroke  #4A7C59 / #3A6349\n\n'+
'<b>Wordmark</b>\n'+
'  "edamame" DM Sans 700, letter-spacing -0.4\n'+
'  Always lowercase. Legal: Edamame Inc.';
</script>
</body>
</html>
